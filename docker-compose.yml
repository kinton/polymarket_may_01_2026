services:
  # Main trading bot - discovers markets and executes trades
  trading-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polymarket-trading-bot
    command: python main.py
    env_file:
      - .env
    volumes:
      - ./config:/app/config    # Strategy config
      - ./data:/app/data        # SQLite databases
      - ./log:/app/log          # Logs
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - polymarket

  # Position settler - redeems winnings and tracks P&L
  position-settler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polymarket-position-settler
    command: python -m src.position_settler --daemon --live --interval 300
    env_file:
      - .env
    volumes:
      - ./config:/app/config    # Strategy config (for SETTLER_DB_PATHS / strategy detection)
      - ./data:/app/data        # Share SQLite databases
      - ./log:/app/log          # Share logs
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - polymarket
    depends_on:
      - trading-bot

networks:
  polymarket:
    driver: bridge

